    margin: 10px 0;

.features li span {

    font-weight: bold;
}

/* Button */
.btn {

    width: 90%;

    margin: 20px auto;
    padding: 18px;

    text-decoration: none;
    box-shadow: 0 5px 15px rgba(0, 123, 255, 0.5);

.btn:hover {

.btn small {
